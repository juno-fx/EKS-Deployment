# Karpenter NodePool - GPU Nodes (Workstation)
#
# Reference template for GPU node pools. This is an example - configure it to match your needs.
#
# LABEL REQUIRED:
#   - juno-innovations.com/workstation: "true"
#   This label identifies nodes for workstation/GPU workloads.
#   Do NOT change this label.
#
# CUSTOMIZE AS NEEDED:
#   - instanceTypes: Use any GPU instance types (g4dn.xlarge, g5.xlarge, p3.2xlarge, p4d.24xlarge, etc.)
#   - capacity-type: Use ["on-demand"] for guaranteed availability or ["spot"] for cost savings
#   - limits: Adjust based on your maximum expected GPU workload
#   - topology.kubernetes.io/zone: Set your primary AZ
#   - nodeClassRef.name: Must match karpenter-nodeclass.yaml (default: service)

apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu
spec:
  # Limits define the maximum resources this pool can provision
  # Adjust these based on your expected GPU workload requirements
  limits:
    cpu: "8"
    memory: 64Gi

  # Node template specification
  template:
    metadata:
      labels:
        # REQUIRED: Identifies workstation/GPU nodes
        juno-innovations.com/workstation: "true"
    spec:
      # Reference to EC2NodeClass - must match karpenter-nodeclass.yaml
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: service

      # Instance requirements - constrain what types of nodes Karpenter can provision
      requirements:
        # Instance families: g=GPU (inferentia, NVIDIA), p=GPU optimized
        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: ["g", "p"]  # REPLACE with your desired GPU instance families

        # Minimum vCPUs
        - key: "karpenter.k8s.aws/instance-cpu"
          operator: Gt
          values: ["0"]  # GPU instances start at 4 vCPUs minimum

        # Availability zone - REPLACE with your primary AZ
        - key: "topology.kubernetes.io/zone"
          operator: In
          values: ["us-east-1a"]  # REPLACE with your AZ (e.g., us-east-1a, us-west-2a)

        # Architecture: amd64 (x86_64)
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]

        # Capacity type: on-demand recommended for GPU workloads
        # Change to ["spot"] for cost savings if interruption is acceptable
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]  # REPLACE: use ["spot"] for cost savings

      # Instance type overrides - REPLACE with your desired GPU instance types
      # Common GPU instances:
      #   g4dn  - NVIDIA T4 (cost-effective ML inference)
      #   g5    - NVIDIA A10G (ML training and inference)
      #   p3    - NVIDIA V100 (deep learning)
      #   p4d   - NVIDIA A100 (high-performance ML)
      #   p5    - NVIDIA H100 (state-of-the-art ML)
      instanceTypes:
        - g4dn.xlarge
        - g5.xlarge
        - p4d.24xlarge  # REPLACE with your desired GPU instance types
