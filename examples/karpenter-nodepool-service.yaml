# Karpenter NodePool - Service Nodes
#
# Reference template for service node pools. This is an example - configure it to match your needs.
#
# LABEL REQUIRED:
#   - juno-innovations.com/service: "true"
#   This label is used by ingress-nginx to target nodes for load balancer nodes.
#   Do NOT change this label.
#
# CUSTOMIZE AS NEEDED:
#   - instanceTypes: Use any EC2 instance types (c5.xlarge, c6a.xlarge, t3.xlarge, etc.)
#   - capacity-type: Use ["spot"] for cost savings or ["on-demand"] for guaranteed availability
#   - limits: Adjust based on your maximum expected workload
#   - topology.kubernetes.io/zone: Set your primary AZ
#   - nodeClassRef.name: Must match karpenter-nodeclass.yaml (default: service)

apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: service
spec:
  # Limits define the maximum resources this pool can provision
  # Adjust these based on your expected workload requirements
  limits:
    cpu: "16"
    memory: 32Gi

  # Node template specification
  template:
    metadata:
      labels:
        # REQUIRED: ingress-nginx uses this to target service nodes
        juno-innovations.com/service: "true"
    spec:
      # Reference to EC2NodeClass - must match karpenter-nodeclass.yaml
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: service

      # Instance requirements - constrain what types of nodes Karpenter can provision
      requirements:
        # Instance families: c=compute, t=memory, r=general, m=memory-optimized, etc.
        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: ["c", "t", "r"]  # REPLACE with your desired instance families

        # Minimum vCPUs (Gt = greater than)
        - key: "karpenter.k8s.aws/instance-cpu"
          operator: Gt
          values: ["2"]  # REPLACE with your minimum CPU requirement

        # Availability zone - REPLACE with your primary AZ
        - key: "topology.kubernetes.io/zone"
          operator: In
          values: ["us-east-1a"]  # REPLACE with your AZ (e.g., us-east-1a, us-west-2a)

        # Architecture: amd64 (x86_64)
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]

        # Capacity type: spot for cost savings, on-demand for guaranteed availability
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["spot"]  # Remove this line or change to ["on-demand"] if spot not suitable

      # Instance type overrides - REPLACE with your desired instance types
      # Examples: c5.xlarge, c5a.xlarge, c6a.xlarge, c7i-flex.xlarge, t3.xlarge
      # Karpenter will randomly select from this list for spot instances
      instanceTypes:
        - c5.xlarge
        - c5a.xlarge
        - c5ad.xlarge
        - c6a.xlarge
        - c7i-flex.xlarge  # REPLACE with your desired instance types
