apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - repoURL: https://kubernetes.github.io/ingress-nginx
      targetRevision: 4.13.3
      chart: ingress-nginx
      helm:
        releaseName: nginx-ingress-controller
        values: |-
          controller:
            extraArgs:
              default-ssl-certificate: "argocd/ingress-certificate"
            kind: DaemonSet
            service:
              annotations:
                # REPLACE with your subnet ID in your primary AZ. Check step 4 in setup.md to get the subnet.          
                service.beta.kubernetes.io/aws-load-balancer-subnets: "ADD SUBNET HERE"