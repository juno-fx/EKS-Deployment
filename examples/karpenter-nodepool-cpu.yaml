# Karpenter NodePool - CPU Nodes (Workstation)
#
# Reference template for general-purpose CPU node pools. This is an example - configure it to match your needs.
#
# LABEL REQUIRED:
#   - juno-innovations.com/workstation: "true"
#   This label identifies nodes for workstation/CPU workloads.
#   Do NOT change this label.
#
# CUSTOMIZE AS NEEDED:
#   - instanceTypes: Use any CPU instance types (c5.xlarge, c5a.xlarge, c6a.xlarge, t3.xlarge, etc.)
#   - capacity-type: Use ["on-demand"] for guaranteed availability or ["spot"] for cost savings
#   - limits: Adjust based on your maximum expected CPU workload
#   - topology.kubernetes.io/zone: Set your primary AZ
#   - nodeClassRef.name: Must match karpenter-nodeclass.yaml (default: service)

apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: cpu
spec:
  # Weight controls scheduling priority when multiple NodePools match a pod.
  # Higher number = preferred first. Range 1-100, unset defaults to 0 (lowest priority).
  # Set higher than other NodePools (e.g. gpu) to make Karpenter prefer this pool.
  weight: 10

  # Limits define the maximum resources this pool can provision
  # Adjust these based on your expected CPU workload requirements
  limits:
    cpu: "12"
    memory: 64Gi

  # Node template specification
  template:
    metadata:
      labels:
        # REQUIRED: Identifies workstation/CPU nodes
        juno-innovations.com/workstation: "true"
    spec:
      # Reference to EC2NodeClass - must match karpenter-nodeclass.yaml
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: service

      # Instance requirements - constrain what types of nodes Karpenter can provision
      requirements:
        # Instance families: c=compute, t=memory, r=general
        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: ["c", "t", "r"]  # REPLACE with your desired CPU instance families

        # Availability zone - REPLACE with your primary AZ
        - key: "topology.kubernetes.io/zone"
          operator: In
          values: ["us-east-2a"]  # REPLACE with your main AZ. Only put 1 and make sure other karpenter files match (e.g., us-east-1a, us-west-2a)

        # Architecture: amd64 (x86_64)
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]

        # Capacity type: on-demand for guaranteed availability, spot for cost savings
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]  # REPLACE: use ["spot"] for cost savings

        # Instance type overrides - REPLACE with your desired CPU instance types
        # Examples: c5.xlarge, c5a.xlarge, c6a.xlarge, c7i-flex.xlarge, t3.xlarge
        - key: "node.kubernetes.io/instance-type"
          operator: In
          values:
            - c5.xlarge
            - c5a.xlarge
            - c6a.xlarge
            - t3.xlarge  # REPLACE with your desired CPU instance types
